# agentSec ATR 规则子集 —— 实测口径
#
# 接入 pyatr 0.2.6 后，规则由 `pyatr.ATREngine.load_bundled_rules()` 提供（内置 459 条，
# Layer 1 = regex/pattern），无需在本目录维护 YAML 拷贝。
#
# 默认子集（ExposureDetector high_severity_only=True, include_experimental=True）：
#   status ∈ {stable, experimental}
#   severity ∈ {critical, high, medium}
#   tags.scan_target ∈ {mcp, skill, both}
#   experimental 的 critical/high 另需 tags.confidence ∈ {high, medium-high}
#   medium 严重度的 experimental 规则全量纳入（不要求 confidence）
#   排除 excluded_rules.yaml（12 条高误报，见 docs/engine/atr-mvp-rules.md §2.1）
# 当前解析约 266 条（278 − 12 排除；随 pyatr 版本可能变化）。
#
# Legacy 最小子集：include_experimental=False, high_severity_only=False → ~16 条 stable。

version: 2
engine: pyatr>=0.2.6
selection:
  status: [stable, experimental]
  severity: [critical, high, medium]
  scan_target: [mcp, skill, both]
  experimental_confidence: [high, medium-high]
  excluded_rules_file: excluded_rules.yaml
  excluded_rule_count: 12
resolved_subset_size: 266
categories_covered:
  - prompt-injection
  - tool-poisoning
  - context-exfiltration
  - agent-manipulation
  - skill-compromise
  - privilege-escalation
  - model-abuse
  - excessive-autonomy
  - data-poisoning
note: scan_target=agent_config 及 llm/llm_io/runtime 目标暂不纳入（需运行时数据或非静态）。
