# Fast checks on push / PR (no full Electron packaging).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Typecheck (app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: npm ci + tsc
        working-directory: app
        run: |
          npm ci
          npx tsc --noEmit

  engine:
    name: Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pytest
        run: ./scripts/run-engine-tests.sh
