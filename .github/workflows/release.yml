# Build macOS DMG + Windows NSIS on version tags, then attach to GitHub Release.
#
# Trigger a release build:
#   git tag v0.1.2
#   git push origin v0.1.2
#
# Manual test build (artifacts only, no Release):
#   Actions → Release → Run workflow

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_windows:
        description: Skip Windows build (experimental)
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        if: matrix.arch == 'arm64'
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        if: matrix.arch == 'x64'

      - name: Package DMG
        env:
          EPUBLISH: never
          CSC_IDENTITY_AUTO_DISCOVERY: false
          AGENTSEC_MAC_ARCH: ${{ matrix.arch }}
        run: ./scripts/package-dmg.sh --arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: AgentSec-macos-dmg-${{ matrix.arch }}
          path: app/release/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows NSIS
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_windows != true }}
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package NSIS installer
        shell: pwsh
        env:
          EPUBLISH: never
        run: .\scripts\package-win.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: AgentSec-windows-exe
          path: app/release/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: AgentSec-*
          merge-multiple: true

      - name: Show artifacts
        run: find artifacts -type f -print

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
